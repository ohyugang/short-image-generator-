<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단문 이미지 생성기</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eeeeee;
      font-family: 'Nanum Myeongjo', serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .panel {
      height: 100vh;
      background: #ffffff;
      padding: 24px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .panel h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 14px;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
    }

    input,
    textarea,
    select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    input[type="range"] {
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.7;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: 800;
      margin-bottom: 16px;
    }

    button:hover {
      background: #333;
    }

    .sub-button {
      background: #666;
    }

    .preview-wrap {
      height: 100vh;
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    canvas {
      width: 520px;
      max-width: none;
      background: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .panel {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid #ddd;
      }

      .preview-wrap {
        height: 80vh;
        padding: 20px;
      }

      canvas {
        width: 100%;
        max-width: 520px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>단문 이미지 생성기</h1>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" value=" " />
      </div>

      <div class="field">
        <label for="titleColor">제목 색상</label>
        <select id="titleColor">
          <option value="#ffffff" selected>흰색</option>
          <option value="#111111">검은색</option>
        </select>
      </div>

      <div class="field">
        <label for="author">작가 이름</label>
        <input id="author" value=" " />
      </div>

      <div class="field">
        <label for="authorColor">작가 이름 색상</label>
        <select id="authorColor">
          <option value="#ffffff" selected>흰색</option>
          <option value="#111111">검은색</option>
        </select>
      </div>

      <div class="field">
        <label for="bodyText">본문</label>
        <textarea id="bodyText"> </textarea>
      </div>

      <div class="field">
        <label for="footer">하단 문구</label>
        <input id="footer" value=" " />
      </div>

      <div class="field">
        <label for="bgImage">제목 배경 이미지 넣기</label>
        <input id="bgImage" type="file" accept="image/*" />
      </div>

      <button class="sub-button" id="resetBgBtn">배경 이미지 삭제</button>

      <div class="field">
        <label for="bgScale">
          제목 배경 이미지 확대/축소: <span id="bgScaleValue">100</span>%
        </label>
        <input type="range" id="bgScale" min="50" max="250" step="1" value="100" />
      </div>

      <button class="sub-button" id="resetBgPositionBtn">배경 이미지 위치 초기화</button>

      <div class="row">
        <div class="field">
          <label for="fontSize">
            본문 글자 크기: <span id="fontSizeValue">12</span>pt
          </label>
          <input type="range" id="fontSize" min="9" max="15" step="1" value="12" />
        </div>

        <div class="field">
          <label for="lineSpacing">
            줄 간격: <span id="lineSpacingValue">1.70</span>
          </label>
          <input type="range" id="lineSpacing" min="1.3" max="2.2" step="0.05" value="1.7" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="bodyMarginType">본문 여백</label>
          <select id="bodyMarginType">
            <option value="narrow">좁게</option>
            <option value="normal" selected>보통</option>
            <option value="wide">넓게</option>
          </select>
        </div>

        <div class="field">
          <label for="titleSize">제목 글자 크기</label>
          <select id="titleSize">
            <option value="24">작게</option>
            <option value="28" selected>보통</option>
            <option value="32">크게</option>
          </select>
        </div>
      </div>

      <button id="downloadBtn">PNG로 저장하기</button>
    </aside>

    <main class="preview-wrap">
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script>
    const DPI = 300;

    function cmToPx(cm) {
      return Math.round((cm / 2.54) * DPI);
    }

    function ptToPx(pt) {
      return (pt / 72) * DPI;
    }

    const PAPER_WIDTH_CM = 10.5 * 2;
    const PAPER_HEIGHT_CM = 14.8 * 2;

    const BODY_MARGINS = {
      narrow: { topCm: 0.8, rightCm: 1.6, bottomCm: 1.4, leftCm: 1.6 },
      normal: { topCm: 1.2, rightCm: 2.2, bottomCm: 2.0, leftCm: 2.2 },
      wide: { topCm: 1.6, rightCm: 2.8, bottomCm: 2.6, leftCm: 2.8 }
    };

    const HEADER_HEIGHT_CM = 6.6;
    const PARAGRAPH_INDENT_EM = 1.0;

    /*
      제목 위치 고정용.
      본문 여백을 보통/넓게로 바꿔도 제목은 항상 '좁게' 기준 위치에 고정됨.
      제목을 더 오른쪽으로 보내고 싶으면 TITLE_RIGHT_SHIFT_CM 값을 키우면 돼.
    */
    const FIXED_TITLE_RIGHT_MARGIN_CM = BODY_MARGINS.narrow.rightCm;
    const TITLE_RIGHT_SHIFT_CM = 0.9;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    const titleInput = document.getElementById("title");
    const titleColorSelect = document.getElementById("titleColor");
    const authorInput = document.getElementById("author");
    const authorColorSelect = document.getElementById("authorColor");
    const bodyInput = document.getElementById("bodyText");
    const footerInput = document.getElementById("footer");
    const bgImageInput = document.getElementById("bgImage");

    const bgScaleInput = document.getElementById("bgScale");
    const bgScaleValue = document.getElementById("bgScaleValue");
    const resetBgPositionBtn = document.getElementById("resetBgPositionBtn");

    const fontSizeSelect = document.getElementById("fontSize");
    const fontSizeValue = document.getElementById("fontSizeValue");

    const lineSpacingSelect = document.getElementById("lineSpacing");
    const lineSpacingValue = document.getElementById("lineSpacingValue");

    const bodyMarginTypeSelect = document.getElementById("bodyMarginType");
    const titleSizeSelect = document.getElementById("titleSize");

    const downloadBtn = document.getElementById("downloadBtn");
    const resetBgBtn = document.getElementById("resetBgBtn");

    let titleBgImage = null;

    let bgOffsetX = 0;
    let bgOffsetY = 0;
    let isDraggingBg = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    let canvasWidth = 0;
    let canvasHeight = 0;
    let headerHeight = 0;

    function updateCanvasSize() {
      canvasWidth = cmToPx(PAPER_WIDTH_CM);
      canvasHeight = cmToPx(PAPER_HEIGHT_CM);
      headerHeight = cmToPx(HEADER_HEIGHT_CM);

      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      canvas.style.width = "520px";
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function getCoverImageBaseSize(image, width, height) {
      const imageRatio = image.width / image.height;
      const boxRatio = width / height;

      let drawWidth;
      let drawHeight;

      if (imageRatio > boxRatio) {
        drawHeight = height;
        drawWidth = height * imageRatio;
      } else {
        drawWidth = width;
        drawHeight = width / imageRatio;
      }

      return { drawWidth, drawHeight };
    }

    function drawHeaderImage(image) {
      const scale = Number(bgScaleInput.value) / 100;
      const base = getCoverImageBaseSize(image, canvas.width, headerHeight);

      const drawWidth = base.drawWidth * scale;
      const drawHeight = base.drawHeight * scale;

      const drawX = (canvas.width - drawWidth) / 2 + bgOffsetX;
      const drawY = (headerHeight - drawHeight) / 2 + bgOffsetY;

      ctx.save();

      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, headerHeight);
      ctx.clip();

      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);

      ctx.restore();
    }

    function drawDefaultTitleBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, headerHeight);
      gradient.addColorStop(0, "#dddddd");
      gradient.addColorStop(0.08, "#f5f5f5");
      gradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, headerHeight);

      ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
      ctx.fillRect(0, 0, canvas.width, headerHeight);

      const overlay = ctx.createLinearGradient(0, 0, 0, headerHeight);
      overlay.addColorStop(0, "rgba(0,0,0,0.0)");
      overlay.addColorStop(0.6, "rgba(0,0,0,0.1)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, canvas.width, headerHeight);
    }

    function drawHeaderOverlay() {
      const overlay = ctx.createLinearGradient(0, 0, 0, headerHeight);
      overlay.addColorStop(0, "rgba(255,255,255,0.08)");
      overlay.addColorStop(0.08, "rgba(0,0,0,0.02)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, canvas.width, headerHeight);
    }

    function wrapText(text, x, y, maxWidth, lineHeight, bottomLimit, indentPx) {
      const paragraphs = text.split("\n");
      let currentY = y;

      for (const paragraph of paragraphs) {
        if (currentY > bottomLimit) return currentY;

        if (paragraph.trim() === "") {
          currentY += lineHeight;
          continue;
        }

        let line = "";
        let isFirstLine = true;

        for (let i = 0; i < paragraph.length; i++) {
          const currentX = isFirstLine ? x + indentPx : x;
          const currentMaxWidth = isFirstLine ? maxWidth - indentPx : maxWidth;

          const testLine = line + paragraph[i];
          const metrics = ctx.measureText(testLine);

          if (metrics.width > currentMaxWidth && line !== "") {
            if (currentY <= bottomLimit) {
              ctx.fillText(line, currentX, currentY);
            }

            line = paragraph[i];
            currentY += lineHeight;
            isFirstLine = false;

            if (currentY > bottomLimit) return currentY;
          } else {
            line = testLine;
          }
        }

        if (currentY <= bottomLimit) {
          const finalX = isFirstLine ? x + indentPx : x;
          ctx.fillText(line, finalX, currentY);
        }

        currentY += lineHeight;
      }

      return currentY;
    }

    function drawTitle(title, titleFontPx, rightMarginPx, bottomMarginPx, titleColor) {
      const baseX = canvas.width - rightMarginPx;
      const titleY = headerHeight - bottomMarginPx;

      ctx.textAlign = "right";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = titleColor;
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      ctx.font = `800 ${titleFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(title, baseX, titleY);
    }

    function drawPageAuthor(author, authorFontPx, leftPx, topPx, authorColor) {
      if (!author.trim()) return;

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = authorColor;
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      ctx.font = `700 ${authorFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(author, leftPx, topPx + authorFontPx);
    }

    function draw() {
      updateCanvasSize();

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const title = titleInput.value || "제목 없음";
      const titleColor = titleColorSelect.value;
      const author = authorInput.value || "";
      const authorColor = authorColorSelect.value;
      const bodyText = bodyInput.value || "";
      const footer = footerInput.value || "";

      bgScaleValue.textContent = bgScaleInput.value;

      const bodyFontSizePt = Number(fontSizeSelect.value);
      const bodyFontSizePx = ptToPx(bodyFontSizePt);
      fontSizeValue.textContent = bodyFontSizePt;

      const lineSpacing = Number(lineSpacingSelect.value);
      lineSpacingValue.textContent = lineSpacing.toFixed(2);

      const marginSetting = BODY_MARGINS[bodyMarginTypeSelect.value];
      const bodyTopMarginPx = cmToPx(marginSetting.topCm);
      const bodyRightMarginPx = cmToPx(marginSetting.rightCm);
      const bodyBottomMarginPx = cmToPx(marginSetting.bottomCm);
      const bodyLeftMarginPx = cmToPx(marginSetting.leftCm);

      const titleFontPx = ptToPx(Number(titleSizeSelect.value));
      const authorFontPx = ptToPx(12);

      const fixedTitleRightMarginPx = cmToPx(FIXED_TITLE_RIGHT_MARGIN_CM);
      const shiftedTitleRightMarginPx = Math.max(
        0,
        fixedTitleRightMarginPx - cmToPx(TITLE_RIGHT_SHIFT_CM)
      );

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (titleBgImage) {
        drawHeaderImage(titleBgImage);
        drawHeaderOverlay();
      } else {
        drawDefaultTitleBackground();
      }

      drawTitle(
        title,
        titleFontPx,
        shiftedTitleRightMarginPx,
        cmToPx(0.75),
        titleColor
      );

      drawPageAuthor(
        author,
        authorFontPx,
        cmToPx(0.08),
        cmToPx(0.08),
        authorColor
      );

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${bodyFontSizePx}px 'Nanum Myeongjo', serif`;

      const textX = bodyLeftMarginPx;
      const textY = headerHeight + bodyTopMarginPx;
      const maxWidth = canvas.width - bodyLeftMarginPx - bodyRightMarginPx;
      const lineHeight = bodyFontSizePx * lineSpacing;
      const indentPx = bodyFontSizePx * PARAGRAPH_INDENT_EM;

      const footerY = canvas.height - cmToPx(0.75);
      const bottomLimit = footerY - bodyBottomMarginPx;

      wrapText(bodyText, textX, textY, maxWidth, lineHeight, bottomLimit, indentPx);

      ctx.textAlign = "center";
      ctx.fillStyle = "#777777";
      ctx.font = `700 ${ptToPx(8)}px 'Nanum Myeongjo', serif`;
      ctx.fillText(footer, canvas.width / 2, footerY);
    }

    bgImageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => {
          titleBgImage = img;
          bgOffsetX = 0;
          bgOffsetY = 0;
          bgScaleInput.value = 100;
          draw();
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    canvas.addEventListener("mousedown", (event) => {
      if (!titleBgImage) return;

      const point = getCanvasPoint(event);

      if (point.y <= headerHeight) {
        isDraggingBg = true;
        lastMouseX = point.x;
        lastMouseY = point.y;
      }
    });

    window.addEventListener("mousemove", (event) => {
      if (!isDraggingBg) return;

      const point = getCanvasPoint(event);

      bgOffsetX += point.x - lastMouseX;
      bgOffsetY += point.y - lastMouseY;

      lastMouseX = point.x;
      lastMouseY = point.y;

      draw();
    });

    window.addEventListener("mouseup", () => {
      isDraggingBg = false;
    });

    canvas.addEventListener("mouseleave", () => {
      isDraggingBg = false;
    });

    resetBgPositionBtn.addEventListener("click", () => {
      bgOffsetX = 0;
      bgOffsetY = 0;
      bgScaleInput.value = 100;
      draw();
    });

    resetBgBtn.addEventListener("click", () => {
      titleBgImage = null;
      bgImageInput.value = "";
      bgOffsetX = 0;
      bgOffsetY = 0;
      bgScaleInput.value = 100;
      draw();
    });

    downloadBtn.addEventListener("click", () => {
      draw();

      const link = document.createElement("a");
      const safeTitle = (titleInput.value || "short-image").replace(/[\\/:*?"<>|]/g, "_");

      link.download = `${safeTitle}_A6x2.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    [
      titleInput,
      titleColorSelect,
      authorInput,
      authorColorSelect,
      bodyInput,
      footerInput,
      bgScaleInput,
      fontSizeSelect,
      lineSpacingSelect,
      bodyMarginTypeSelect,
      titleSizeSelect
    ].forEach((element) => {
      element.addEventListener("input", draw);
      element.addEventListener("change", draw);
    });

    document.fonts.ready.then(draw);
    draw();
  </script>
</body>
</html>
