<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단문 이미지 생성기</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eeeeee;
      font-family: 'Nanum Myeongjo', serif;
      color: #111;
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .panel {
      height: 100vh;
      background: #ffffff;
      padding: 24px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .panel h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 14px;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
    }

    input,
    textarea,
    select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    input[type="range"] {
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.7;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: 800;
    }

    button:hover {
      background: #333;
    }

    .sub-button {
      background: #666;
      margin-top: 8px;
    }

    .preview-wrap {
      height: 100vh;
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    canvas {
      width: 420px;
      max-width: none;
      background: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .hint {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
    }

    .mini-note {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .panel {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid #ddd;
      }

      .preview-wrap {
        height: 80vh;
        padding: 20px;
      }

      canvas {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>단문 이미지 생성기</h1>

      <div class="field">
        <label for="paperSize">이미지 크기</label>
        <select id="paperSize">
          <option value="A6" selected>A6 세로형</option>
          <option value="A5">A5 세로형</option>
        </select>
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" value="거짓말쟁이의 시선" />
      </div>

      <div class="field">
        <label for="author">작가 이름</label>
        <input id="author" value="오강유" />
      </div>

      <div class="field">
        <label for="bodyText">본문</label>
        <textarea id="bodyText">제인의 눈은 이상하다. 맑다거나 투명하다거나, 그런 말로 끝내기엔 너무 어려운 눈이다. 평범한 귀족 아가씨의 눈이라면 평범한 사람들처럼 포장하면 된다. 하늘을 수놓은 별빛처럼 반짝인다. 순진해 보인다. 거짓말은 아니지만, 진실도 아니다.

그런데 네 눈은 보지 않으려고 하면 더 잘 보인다.

찻잔을 든 손은 단정하고, 허리는 곧고, 고개는 아주 조금 기울어져 있다. 모르는 사람이 보면 얌전한 아가씨라 생각하겠지. 속이려는 의도도 없으면서 사람을 속이는 얼굴.

“해리스 씨?”

부르지 마. 아니, 한 번 더 불러도 괜찮고. 이상하군. 네가 내 이름을 부르면 내가 나를 설명해야 할 것 같다.

벌써 졌네.

나는 네가 아무것도 하지 않는다는 걸 안다. 그냥 보고 있을 뿐이다. 그런데 나는 그 시선 하나에 너무 많은 것을 잃고 있다.</textarea>
      </div>

      <div class="field">
        <label for="footer">하단 문구</label>
        <input id="footer" value="〈거짓말쟁이의 시선〉" />
      </div>

      <div class="field">
        <label for="bgImage">제목 배경 이미지 넣기</label>
        <input id="bgImage" type="file" accept="image/*" />
        <div class="mini-note">이미지를 넣은 뒤, 미리보기의 제목 영역을 마우스로 드래그하면 위치를 조정할 수 있어.</div>
      </div>

      <div class="field">
        <label for="bgScale">
          제목 배경 이미지 확대/축소: <span id="bgScaleValue">100</span>%
        </label>
        <input type="range" id="bgScale" min="50" max="250" step="1" value="100" />
      </div>

      <button class="sub-button" id="resetBgPositionBtn">배경 이미지 위치 초기화</button>

      <div class="row">
        <div class="field">
          <label for="fontSize">
            본문 글자 크기: <span id="fontSizeValue">12</span>pt
          </label>
          <input type="range" id="fontSize" min="9" max="15" step="1" value="12" />
        </div>

        <div class="field">
          <label for="lineSpacing">
            줄 간격: <span id="lineSpacingValue">1.70</span>
          </label>
          <input type="range" id="lineSpacing" min="1.3" max="2.2" step="0.05" value="1.7" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="bodyMarginType">본문 여백</label>
          <select id="bodyMarginType">
            <option value="narrow">좁게</option>
            <option value="normal" selected>보통</option>
            <option value="wide">넓게</option>
          </select>
          <div class="mini-note">위, 아래, 좌, 우 여백이 함께 조정돼.</div>
        </div>

        <div class="field">
          <label for="titleSize">제목 글자 크기</label>
          <select id="titleSize">
            <option value="20">작게</option>
            <option value="24" selected>보통</option>
            <option value="28">크게</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="authorSize">작가 이름 글자 크기</label>
          <select id="authorSize">
            <option value="10">작게</option>
            <option value="12" selected>보통</option>
            <option value="14">크게</option>
          </select>
        </div>

        <div class="field">
          <label for="titleAuthorGap">제목-작가 간격</label>
          <select id="titleAuthorGap">
            <option value="3">좁게</option>
            <option value="6" selected>보통</option>
            <option value="10">넓게</option>
          </select>
        </div>
      </div>

      <button id="downloadBtn">PNG로 저장하기</button>
      <button class="sub-button" id="resetBgBtn">배경 이미지 삭제</button>

      <div class="hint">
        이미지 크기는 A5/A6 중 선택할 수 있어.<br />
        제목 배경 이미지는 상단 3.3cm 영역 안에 자동으로 들어가.<br />
        본문 여백은 좁게, 보통, 넓게 중 하나를 고르면 위아래좌우가 함께 조정돼.<br />
        하단 문구는 기존보다 조금 위쪽에 배치했어.
      </div>
    </aside>

    <main class="preview-wrap">
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script>
    const DPI = 300;

    function cmToPx(cm) {
      return Math.round((cm / 2.54) * DPI);
    }

    function ptToPx(pt) {
      return (pt / 72) * DPI;
    }

    const PAPER_SIZES = {
      A6: { widthCm: 10.5, heightCm: 14.8 },
      A5: { widthCm: 14.8, heightCm: 21.0 }
    };

    const BODY_MARGINS = {
      narrow: { topCm: 0.8, rightCm: 0.8, bottomCm: 0.8, leftCm: 0.8 },
      normal: { topCm: 1.2, rightCm: 1.1, bottomCm: 1.2, leftCm: 1.1 },
      wide: { topCm: 1.6, rightCm: 1.4, bottomCm: 1.6, leftCm: 1.4 }
    };

    const HEADER_HEIGHT_CM = 3.3;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const paperSizeSelect = document.getElementById("paperSize");
    const titleInput = document.getElementById("title");
    const authorInput = document.getElementById("author");
    const bodyInput = document.getElementById("bodyText");
    const footerInput = document.getElementById("footer");
    const bgImageInput = document.getElementById("bgImage");

    const bgScaleInput = document.getElementById("bgScale");
    const bgScaleValue = document.getElementById("bgScaleValue");
    const resetBgPositionBtn = document.getElementById("resetBgPositionBtn");

    const fontSizeSelect = document.getElementById("fontSize");
    const fontSizeValue = document.getElementById("fontSizeValue");

    const lineSpacingSelect = document.getElementById("lineSpacing");
    const lineSpacingValue = document.getElementById("lineSpacingValue");

    const bodyMarginTypeSelect = document.getElementById("bodyMarginType");
    const titleSizeSelect = document.getElementById("titleSize");
    const authorSizeSelect = document.getElementById("authorSize");
    const titleAuthorGapSelect = document.getElementById("titleAuthorGap");

    const downloadBtn = document.getElementById("downloadBtn");
    const resetBgBtn = document.getElementById("resetBgBtn");

    let titleBgImage = null;

    let bgOffsetX = 0;
    let bgOffsetY = 0;
    let isDraggingBg = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    let canvasWidth = 0;
    let canvasHeight = 0;
    let headerHeight = 0;

    function updateCanvasSize() {
      const selectedSize = PAPER_SIZES[paperSizeSelect.value];

      canvasWidth = cmToPx(selectedSize.widthCm);
      canvasHeight = cmToPx(selectedSize.heightCm);
      headerHeight = cmToPx(HEADER_HEIGHT_CM);

      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      if (paperSizeSelect.value === "A5") {
        canvas.style.width = "520px";
      } else {
        canvas.style.width = "420px";
      }
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function getCoverImageBaseSize(image, width, height) {
      const imageRatio = image.width / image.height;
      const boxRatio = width / height;

      let drawWidth;
      let drawHeight;

      if (imageRatio > boxRatio) {
        drawHeight = height;
        drawWidth = height * imageRatio;
      } else {
        drawWidth = width;
        drawHeight = width / imageRatio;
      }

      return { drawWidth, drawHeight };
    }

    function drawHeaderImage(image) {
      const scale = Number(bgScaleInput.value) / 100;
      const base = getCoverImageBaseSize(image, canvas.width, headerHeight);

      const drawWidth = base.drawWidth * scale;
      const drawHeight = base.drawHeight * scale;

      const drawX = (canvas.width - drawWidth) / 2 + bgOffsetX;
      const drawY = (headerHeight - drawHeight) / 2 + bgOffsetY;

      ctx.save();

      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, headerHeight);
      ctx.clip();

      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);

      ctx.restore();
    }

    function drawDefaultTitleBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, headerHeight);
      gradient.addColorStop(0, "#dddddd");
      gradient.addColorStop(0.45, "#f5f5f5");
      gradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, headerHeight);

      ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
      ctx.fillRect(0, 0, canvas.width, headerHeight);

      const overlay = ctx.createLinearGradient(0, 0, 0, headerHeight);
      overlay.addColorStop(0, "rgba(0,0,0,0.0)");
      overlay.addColorStop(0.6, "rgba(0,0,0,0.1)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, canvas.width, headerHeight);
    }

    function drawHeaderOverlay() {
      const overlay = ctx.createLinearGradient(0, 0, 0, headerHeight);
      overlay.addColorStop(0, "rgba(255,255,255,0.08)");
      overlay.addColorStop(0.45, "rgba(0,0,0,0.02)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, canvas.width, headerHeight);
    }

    function wrapText(text, x, y, maxWidth, lineHeight, bottomLimit) {
      const paragraphs = text.split("\n");
      let currentY = y;

      for (const paragraph of paragraphs) {
        if (currentY > bottomLimit) return currentY;

        if (paragraph.trim() === "") {
          currentY += lineHeight;
          continue;
        }

        let line = "";

        for (let i = 0; i < paragraph.length; i++) {
          const testLine = line + paragraph[i];
          const metrics = ctx.measureText(testLine);

          if (metrics.width > maxWidth && line !== "") {
            if (currentY <= bottomLimit) {
              ctx.fillText(line, x, currentY);
            }

            line = paragraph[i];
            currentY += lineHeight;

            if (currentY > bottomLimit) return currentY;
          } else {
            line = testLine;
          }
        }

        if (currentY <= bottomLimit) {
          ctx.fillText(line, x, currentY);
        }

        currentY += lineHeight;
      }

      return currentY;
    }

    function drawTitleAndAuthor(
      title,
      author,
      titleFontPx,
      authorFontPx,
      rightMarginPx,
      bottomMarginPx,
      gapPx
    ) {
      const baseX = canvas.width - rightMarginPx;
      const authorY = headerHeight - bottomMarginPx;
      const titleY = authorY - authorFontPx - gapPx;

      ctx.textAlign = "right";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "rgba(0, 0, 0, 0.45)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 2;

      ctx.font = `800 ${titleFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(title, baseX, titleY);

      ctx.font = `700 ${authorFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(author, baseX, authorY);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function draw() {
      updateCanvasSize();

      const title = titleInput.value || "제목 없음";
      const author = authorInput.value || "";
      const bodyText = bodyInput.value || "";
      const footer = footerInput.value || "";

      bgScaleValue.textContent = bgScaleInput.value;

      const bodyFontSizePt = Number(fontSizeSelect.value);
      const bodyFontSizePx = ptToPx(bodyFontSizePt);
      fontSizeValue.textContent = bodyFontSizePt;

      const lineSpacing = Number(lineSpacingSelect.value);
      lineSpacingValue.textContent = lineSpacing.toFixed(2);

      const marginSetting = BODY_MARGINS[bodyMarginTypeSelect.value];
      const bodyTopMarginPx = cmToPx(marginSetting.topCm);
      const bodyRightMarginPx = cmToPx(marginSetting.rightCm);
      const bodyBottomMarginPx = cmToPx(marginSetting.bottomCm);
      const bodyLeftMarginPx = cmToPx(marginSetting.leftCm);

      const titleFontPx = ptToPx(Number(titleSizeSelect.value));
      const authorFontPx = ptToPx(Number(authorSizeSelect.value));
      const gapPx = ptToPx(Number(titleAuthorGapSelect.value));

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (titleBgImage) {
        drawHeaderImage(titleBgImage);
        drawHeaderOverlay();
      } else {
        drawDefaultTitleBackground();
      }

      drawTitleAndAuthor(
        title,
        author,
        titleFontPx,
        authorFontPx,
        bodyRightMarginPx,
        cmToPx(0.35),
        gapPx
      );

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${bodyFontSizePx}px 'Nanum Myeongjo', serif`;

      const textX = bodyLeftMarginPx;
      const textY = headerHeight + bodyTopMarginPx;
      const maxWidth = canvas.width - bodyLeftMarginPx - bodyRightMarginPx;
      const lineHeight = bodyFontSizePx * lineSpacing;

      const footerY = canvas.height - cmToPx(0.75);
      const bottomLimit = footerY - bodyBottomMarginPx;

      wrapText(bodyText, textX, textY, maxWidth, lineHeight, bottomLimit);

      ctx.textAlign = "center";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${ptToPx(10)}px 'Nanum Myeongjo', serif`;
      ctx.fillText(footer, canvas.width / 2, footerY);
    }

    bgImageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => {
          titleBgImage = img;
          bgOffsetX = 0;
          bgOffsetY = 0;
          bgScaleInput.value = 100;
          draw();
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    canvas.addEventListener("mousedown", (event) => {
      if (!titleBgImage) return;

      const point = getCanvasPoint(event);

      if (point.y <= headerHeight) {
        isDraggingBg = true;
        lastMouseX = point.x;
        lastMouseY = point.y;
      }
    });

    window.addEventListener("mousemove", (event) => {
      if (!isDraggingBg) return;

      const point = getCanvasPoint(event);

      bgOffsetX += point.x - lastMouseX;
      bgOffsetY += point.y - lastMouseY;

      lastMouseX = point.x;
      lastMouseY = point.y;

      draw();
    });

    window.addEventListener("mouseup", () => {
      isDraggingBg = false;
    });

    canvas.addEventListener("mouseleave", () => {
      isDraggingBg = false;
    });

    resetBgPositionBtn.addEventListener("click", () => {
      bgOffsetX = 0;
      bgOffsetY = 0;
      bgScaleInput.value = 100;
      draw();
    });

    resetBgBtn.addEventListener("click", () => {
      titleBgImage = null;
      bgImageInput.value = "";
      bgOffsetX = 0;
      bgOffsetY = 0;
      bgScaleInput.value = 100;
      draw();
    });

    downloadBtn.addEventListener("click", () => {
      draw();

      const link = document.createElement("a");
      const safeTitle = (titleInput.value || "short-image").replace(/[\\/:*?"<>|]/g, "_");
      const selectedPaper = paperSizeSelect.value;

      link.download = `${safeTitle}_${selectedPaper}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    [
      paperSizeSelect,
      titleInput,
      authorInput,
      bodyInput,
      footerInput,
      bgScaleInput,
      fontSizeSelect,
      lineSpacingSelect,
      bodyMarginTypeSelect,
      titleSizeSelect,
      authorSizeSelect,
      titleAuthorGapSelect
    ].forEach((element) => {
      element.addEventListener("input", draw);
      element.addEventListener("change", draw);
    });

    document.fonts.ready.then(draw);
    draw();
  </script>
</body>
</html>
