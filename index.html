<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단문 이미지 생성기</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eeeeee;
      font-family: 'Nanum Myeongjo', serif;
      color: #111;
    }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #ffffff;
      padding: 24px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .panel h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 14px;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
    }

    input,
    textarea,
    select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    input[type="range"] {
      padding: 0;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.7;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: 800;
    }

    button:hover {
      background: #333;
    }

    .sub-button {
      background: #666;
      margin-top: 8px;
    }

    .preview-wrap {
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    canvas {
      width: 420px;
      max-width: 100%;
      background: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    .hint {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
    }

    .mini-note {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: 0;
        border-bottom: 1px solid #ddd;
      }

      .preview-wrap {
        padding: 20px;
      }

      canvas {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>단문 이미지 생성기</h1>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" value="거짓말쟁이의 시선" />
      </div>

      <div class="field">
        <label for="author">작가 이름</label>
        <input id="author" value="오강유" />
      </div>

      <div class="field">
        <label for="bodyText">본문</label>
        <textarea id="bodyText">제인의 눈은 이상하다. 맑다거나 투명하다거나, 그런 말로 끝내기엔 너무 어려운 눈이다. 평범한 귀족 아가씨의 눈이라면 평범한 사람들처럼 포장하면 된다. 하늘을 수놓은 별빛처럼 반짝인다. 순진해 보인다. 거짓말은 아니지만, 진실도 아니다.

그런데 네 눈은 보지 않으려고 하면 더 잘 보인다.

찻잔을 든 손은 단정하고, 허리는 곧고, 고개는 아주 조금 기울어져 있다. 모르는 사람이 보면 얌전한 아가씨라 생각하겠지. 속이려는 의도도 없으면서 사람을 속이는 얼굴.

“해리스 씨?”

부르지 마. 아니, 한 번 더 불러도 괜찮고. 이상하군. 네가 내 이름을 부르면 내가 나를 설명해야 할 것 같다.

벌써 졌네.

나는 네가 아무것도 하지 않는다는 걸 안다. 그냥 보고 있을 뿐이다. 그런데 나는 그 시선 하나에 너무 많은 것을 잃고 있다.</textarea>
      </div>

      <div class="field">
        <label for="footer">하단 문구</label>
        <input id="footer" value="〈거짓말쟁이의 시선〉" />
      </div>

      <div class="field">
        <label for="bgImage">제목 배경 이미지 넣기</label>
        <input id="bgImage" type="file" accept="image/*" />
      </div>

      <div class="row">
        <div class="field">
          <label for="fontSize">
            본문 글자 크기: <span id="fontSizeValue">12</span>pt
          </label>
          <input type="range" id="fontSize" min="9" max="15" step="1" value="12" />
        </div>

        <div class="field">
          <label for="lineSpacing">
            줄 간격: <span id="lineSpacingValue">1.70</span>
          </label>
          <input type="range" id="lineSpacing" min="1.3" max="2.2" step="0.05" value="1.7" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="marginType">여백</label>
          <select id="marginType">
            <option value="0.8">좁게</option>
            <option value="1.1" selected>보통</option>
            <option value="1.4">넓게</option>
          </select>
        </div>

        <div class="field">
          <label for="titleSize">제목 글자 크기</label>
          <select id="titleSize">
            <option value="20">작게</option>
            <option value="24" selected>보통</option>
            <option value="28">크게</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="authorSize">작가 이름 글자 크기</label>
          <select id="authorSize">
            <option value="10">작게</option>
            <option value="12" selected>보통</option>
            <option value="14">크게</option>
          </select>
        </div>

        <div class="field">
          <label for="titleAuthorGap">제목-작가 간격</label>
          <select id="titleAuthorGap">
            <option value="3">좁게</option>
            <option value="6" selected>보통</option>
            <option value="10">넓게</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="titleOffsetX">
            제목 위치 좌우: <span id="titleOffsetXValue">0</span>px
          </label>
          <input type="range" id="titleOffsetX" min="-120" max="120" step="1" value="0" />
          <div class="mini-note">음수 = 왼쪽 / 양수 = 오른쪽</div>
        </div>

        <div class="field">
          <label for="titleOffsetY">
            제목 위치 상하: <span id="titleOffsetYValue">0</span>px
          </label>
          <input type="range" id="titleOffsetY" min="-120" max="120" step="1" value="0" />
          <div class="mini-note">음수 = 위 / 양수 = 아래</div>
        </div>
      </div>

      <button id="downloadBtn">PNG로 저장하기</button>
      <button class="sub-button" id="resetBgBtn">배경 이미지 삭제</button>

      <div class="hint">
        출력 크기는 A6 세로형 기준이야.<br />
        제목 배경 이미지는 상단 6.6cm 높이 영역에 들어가고, 제목은 기본적으로 오른쪽 아래에 배치돼.<br />
        슬라이더로 줄 간격과 제목 위치를 바로 조절할 수 있어.
      </div>
    </aside>

    <main class="preview-wrap">
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script>
    const DPI = 300;

    function cmToPx(cm) {
      return Math.round((cm / 2.54) * DPI);
    }

    function ptToPx(pt) {
      return (pt / 72) * DPI;
    }

    const A6_WIDTH_CM = 10.5;
    const A6_HEIGHT_CM = 14.8;
    const HEADER_HEIGHT_CM = 6.6;

    const CANVAS_WIDTH = cmToPx(A6_WIDTH_CM);
    const CANVAS_HEIGHT = cmToPx(A6_HEIGHT_CM);
    const HEADER_HEIGHT = cmToPx(HEADER_HEIGHT_CM);

    const canvas = document.getElementById("canvas");
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    const ctx = canvas.getContext("2d");

    const titleInput = document.getElementById("title");
    const authorInput = document.getElementById("author");
    const bodyInput = document.getElementById("bodyText");
    const footerInput = document.getElementById("footer");
    const bgImageInput = document.getElementById("bgImage");

    const fontSizeSelect = document.getElementById("fontSize");
    const fontSizeValue = document.getElementById("fontSizeValue");

    const lineSpacingSelect = document.getElementById("lineSpacing");
    const lineSpacingValue = document.getElementById("lineSpacingValue");

    const marginTypeSelect = document.getElementById("marginType");
    const titleSizeSelect = document.getElementById("titleSize");
    const authorSizeSelect = document.getElementById("authorSize");
    const titleAuthorGapSelect = document.getElementById("titleAuthorGap");

    const titleOffsetXInput = document.getElementById("titleOffsetX");
    const titleOffsetXValue = document.getElementById("titleOffsetXValue");
    const titleOffsetYInput = document.getElementById("titleOffsetY");
    const titleOffsetYValue = document.getElementById("titleOffsetYValue");

    const downloadBtn = document.getElementById("downloadBtn");
    const resetBgBtn = document.getElementById("resetBgBtn");

    let titleBgImage = null;

    function drawCoverImage(image, x, y, width, height) {
      const imageRatio = image.width / image.height;
      const boxRatio = width / height;

      let drawWidth;
      let drawHeight;
      let drawX;
      let drawY;

      if (imageRatio > boxRatio) {
        drawHeight = height;
        drawWidth = height * imageRatio;
        drawX = x - (drawWidth - width) / 2;
        drawY = y;
      } else {
        drawWidth = width;
        drawHeight = width / imageRatio;
        drawX = x;
        drawY = y - (drawHeight - height) / 2;
      }

      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
    }

    function drawDefaultTitleBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, HEADER_HEIGHT);
      gradient.addColorStop(0, "#dddddd");
      gradient.addColorStop(0.45, "#f5f5f5");
      gradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, HEADER_HEIGHT);

      ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
      ctx.fillRect(0, 0, canvas.width, HEADER_HEIGHT);

      const overlay = ctx.createLinearGradient(0, 0, 0, HEADER_HEIGHT);
      overlay.addColorStop(0, "rgba(0,0,0,0.0)");
      overlay.addColorStop(0.6, "rgba(0,0,0,0.1)");
      overlay.addColorStop(1, "rgba(0,0,0,0.55)");
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, canvas.width, HEADER_HEIGHT);
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const paragraphs = text.split("\n");
      let currentY = y;

      for (const paragraph of paragraphs) {
        if (paragraph.trim() === "") {
          currentY += lineHeight;
          continue;
        }

        let line = "";

        for (let i = 0; i < paragraph.length; i++) {
          const testLine = line + paragraph[i];
          const metrics = ctx.measureText(testLine);

          if (metrics.width > maxWidth && line !== "") {
            ctx.fillText(line, x, currentY);
            line = paragraph[i];
            currentY += lineHeight;
          } else {
            line = testLine;
          }
        }

        ctx.fillText(line, x, currentY);
        currentY += lineHeight;
      }

      return currentY;
    }

    function drawTitleAndAuthor(
      title,
      author,
      titleFontPx,
      authorFontPx,
      rightMarginPx,
      bottomMarginPx,
      gapPx,
      offsetX,
      offsetY
    ) {
      const baseX = canvas.width - rightMarginPx + offsetX;
      const authorY = HEADER_HEIGHT - bottomMarginPx + offsetY;
      const titleY = authorY - authorFontPx - gapPx;

      ctx.textAlign = "right";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "rgba(0, 0, 0, 0.45)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 2;

      ctx.font = `800 ${titleFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(title, baseX, titleY);

      ctx.font = `700 ${authorFontPx}px 'Nanum Myeongjo', serif`;
      ctx.fillText(author, baseX, authorY);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    function draw() {
      const title = titleInput.value || "제목 없음";
      const author = authorInput.value || "";
      const bodyText = bodyInput.value || "";
      const footer = footerInput.value || "";

      const bodyFontSizePt = Number(fontSizeSelect.value);
      const bodyFontSizePx = ptToPx(bodyFontSizePt);
      fontSizeValue.textContent = bodyFontSizePt;

      const lineSpacing = Number(lineSpacingSelect.value);
      lineSpacingValue.textContent = lineSpacing.toFixed(2);

      const marginCm = Number(marginTypeSelect.value);
      const marginPx = cmToPx(marginCm);

      const titleFontPx = ptToPx(Number(titleSizeSelect.value));
      const authorFontPx = ptToPx(Number(authorSizeSelect.value));
      const gapPx = ptToPx(Number(titleAuthorGapSelect.value));

      const titleOffsetX = Number(titleOffsetXInput.value);
      const titleOffsetY = Number(titleOffsetYInput.value);
      titleOffsetXValue.textContent = titleOffsetX;
      titleOffsetYValue.textContent = titleOffsetY;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (titleBgImage) {
        drawCoverImage(titleBgImage, 0, 0, canvas.width, HEADER_HEIGHT);

        const overlay = ctx.createLinearGradient(0, 0, 0, HEADER_HEIGHT);
        overlay.addColorStop(0, "rgba(255,255,255,0.10)");
        overlay.addColorStop(0.55, "rgba(0,0,0,0.05)");
        overlay.addColorStop(1, "rgba(0,0,0,0.55)");
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, canvas.width, HEADER_HEIGHT);
      } else {
        drawDefaultTitleBackground();
      }

      drawTitleAndAuthor(
        title,
        author,
        titleFontPx,
        authorFontPx,
        marginPx,
        cmToPx(0.45),
        gapPx,
        titleOffsetX,
        titleOffsetY
      );

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${bodyFontSizePx}px 'Nanum Myeongjo', serif`;

      const textX = marginPx;
      const textY = HEADER_HEIGHT + cmToPx(0.7);
      const maxWidth = canvas.width - marginPx * 2;
      const lineHeight = bodyFontSizePx * lineSpacing;

      wrapText(bodyText, textX, textY, maxWidth, lineHeight);

      ctx.textAlign = "center";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${ptToPx(10)}px 'Nanum Myeongjo', serif`;
      ctx.fillText(footer, canvas.width / 2, canvas.height - cmToPx(0.35));
    }

    bgImageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => {
          titleBgImage = img;
          draw();
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    resetBgBtn.addEventListener("click", () => {
      titleBgImage = null;
      bgImageInput.value = "";
      draw();
    });

    downloadBtn.addEventListener("click", () => {
      draw();

      const link = document.createElement("a");
      const safeTitle = (titleInput.value || "short-image").replace(/[\\/:*?"<>|]/g, "_");
      link.download = `${safeTitle}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    [
      titleInput,
      authorInput,
      bodyInput,
      footerInput,
      fontSizeSelect,
      lineSpacingSelect,
      marginTypeSelect,
      titleSizeSelect,
      authorSizeSelect,
      titleAuthorGapSelect,
      titleOffsetXInput,
      titleOffsetYInput
    ].forEach((element) => {
      element.addEventListener("input", draw);
      element.addEventListener("change", draw);
    });

    document.fonts.ready.then(draw);
    draw();
  </script>
</body>
</html>
