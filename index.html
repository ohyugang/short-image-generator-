<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단문 이미지 생성기</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eeeeee;
      font-family: 'Nanum Myeongjo', serif;
      color: #111;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #ffffff;
      padding: 24px;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .panel h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 14px;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
    }

    input,
    textarea,
    select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.7;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: 800;
    }

    button:hover {
      background: #333;
    }

    .sub-button {
      background: #666;
      margin-top: 8px;
    }

    .preview-wrap {
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    canvas {
      width: 540px;
      max-width: 100%;
      background: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    .hint {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: 0;
        border-bottom: 1px solid #ddd;
      }

      .preview-wrap {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>단문 이미지 생성기</h1>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" value="거짓말쟁이의 시선" />
      </div>

      <div class="field">
        <label for="bodyText">본문</label>
        <textarea id="bodyText">제인의 눈은 이상하다. 맑다거나 투명하다거나, 그런 말로 끝내기엔 너무 어려운 눈이다. 평범한 귀족 아가씨의 눈이라면 평범한 사람들처럼 포장하면 된다. 하늘을 수놓은 별빛처럼 반짝인다. 순진해 보인다. 거짓말은 아니지만, 진실도 아니다.

그런데 네 눈은 보지 않으려고 하면 더 잘 보인다.

찻잔을 든 손은 단정하고, 허리는 곧고, 고개는 아주 조금 기울어져 있다. 모르는 사람이 보면 얌전한 아가씨라 생각하겠지. 속이려는 의도도 없으면서 사람을 속이는 얼굴.

“해리스 씨?”

부르지 마. 아니, 한 번 더 불러도 괜찮고. 이상하군. 네가 내 이름을 부르면 내가 나를 설명해야 할 것 같다.

벌써 졌네.

나는 네가 아무것도 하지 않는다는 걸 안다. 그냥 보고 있을 뿐이다. 그런데 나는 그 시선 하나에 너무 많은 것을 잃고 있다.</textarea>
      </div>

      <div class="field">
        <label for="footer">하단 문구</label>
        <input id="footer" value="〈거짓말쟁이의 시선〉" />
      </div>

      <div class="field">
        <label for="bgImage">제목 배경 이미지 넣기</label>
        <input id="bgImage" type="file" accept="image/*" />
      </div>

      <div class="row">
        <div class="field">
          <label for="fontSize">본문 글자 크기</label>
          <select id="fontSize">
            <option value="34">작게</option>
            <option value="38" selected>보통</option>
            <option value="42">크게</option>
          </select>
        </div>

        <div class="field">
          <label for="marginType">여백</label>
          <select id="marginType">
            <option value="90">좁게</option>
            <option value="120" selected>보통</option>
            <option value="150">넓게</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="titleSize">제목 글자 크기</label>
        <select id="titleSize">
          <option value="70">작게</option>
          <option value="82" selected>보통</option>
          <option value="94">크게</option>
        </select>
      </div>

      <button id="downloadBtn">PNG로 저장하기</button>
      <button class="sub-button" id="resetBgBtn">배경 이미지 삭제</button>

      <div class="hint">
        제목 배경 이미지를 넣지 않으면 기본 회색 조명 배경으로 생성돼.<br />
        본문이 너무 길면 글자가 아래로 넘어갈 수 있으니, 단문 기준으로 쓰는 걸 추천!
      </div>
    </aside>

    <main class="preview-wrap">
      <canvas id="canvas" width="1080" height="1527"></canvas>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const titleInput = document.getElementById("title");
    const bodyInput = document.getElementById("bodyText");
    const footerInput = document.getElementById("footer");
    const bgImageInput = document.getElementById("bgImage");
    const fontSizeSelect = document.getElementById("fontSize");
    const marginTypeSelect = document.getElementById("marginType");
    const titleSizeSelect = document.getElementById("titleSize");
    const downloadBtn = document.getElementById("downloadBtn");
    const resetBgBtn = document.getElementById("resetBgBtn");

    let titleBgImage = null;

    function drawRoundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    function drawCoverImage(image, x, y, width, height) {
      const imageRatio = image.width / image.height;
      const boxRatio = width / height;

      let drawWidth;
      let drawHeight;
      let drawX;
      let drawY;

      if (imageRatio > boxRatio) {
        drawHeight = height;
        drawWidth = height * imageRatio;
        drawX = x - (drawWidth - width) / 2;
        drawY = y;
      } else {
        drawWidth = width;
        drawHeight = width / imageRatio;
        drawX = x;
        drawY = y - (drawHeight - height) / 2;
      }

      ctx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
    }

    function drawDefaultTitleBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, 330);
      gradient.addColorStop(0, "#d6d6d6");
      gradient.addColorStop(0.5, "#f7f7f7");
      gradient.addColorStop(1, "#cfcfcf");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, 330);

      ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
      ctx.fillRect(0, 0, canvas.width, 85);

      ctx.fillStyle = "rgba(230, 230, 230, 0.8)";
      ctx.fillRect(0, 300, canvas.width, 30);

      ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
      drawRoundedRect(120, 80, 840, 170, 30);
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const paragraphs = text.split("\n");
      let currentY = y;

      for (const paragraph of paragraphs) {
        if (paragraph.trim() === "") {
          currentY += lineHeight;
          continue;
        }

        let line = "";

        for (let i = 0; i < paragraph.length; i++) {
          const testLine = line + paragraph[i];
          const metrics = ctx.measureText(testLine);

          if (metrics.width > maxWidth && line !== "") {
            ctx.fillText(line, x, currentY);
            line = paragraph[i];
            currentY += lineHeight;
          } else {
            line = testLine;
          }
        }

        ctx.fillText(line, x, currentY);
        currentY += lineHeight;
      }

      return currentY;
    }

    function draw() {
      const title = titleInput.value || "제목 없음";
      const bodyText = bodyInput.value || "";
      const footer = footerInput.value || "";

      const bodyFontSize = Number(fontSizeSelect.value);
      const margin = Number(marginTypeSelect.value);
      const titleFontSize = Number(titleSizeSelect.value);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (titleBgImage) {
        drawCoverImage(titleBgImage, 0, 0, canvas.width, 330);
        ctx.fillStyle = "rgba(255, 255, 255, 0.28)";
        ctx.fillRect(0, 0, canvas.width, 330);
      } else {
        drawDefaultTitleBackground();
      }

      ctx.fillStyle = "#000000";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `800 ${titleFontSize}px 'Nanum Myeongjo', serif`;
      ctx.fillText(title, canvas.width / 2, 200);

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#111111";
      ctx.font = `700 ${bodyFontSize}px 'Nanum Myeongjo', serif`;

      const textX = margin;
      const textY = 430;
      const maxWidth = canvas.width - margin * 2;
      const lineHeight = bodyFontSize * 1.65;

      wrapText(bodyText, textX, textY, maxWidth, lineHeight);

      ctx.textAlign = "center";
      ctx.font = `700 24px 'Nanum Myeongjo', serif`;
      ctx.fillStyle = "#111111";
      ctx.fillText(footer, canvas.width / 2, canvas.height - 55);
    }

    bgImageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => {
          titleBgImage = img;
          draw();
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    resetBgBtn.addEventListener("click", () => {
      titleBgImage = null;
      bgImageInput.value = "";
      draw();
    });

    downloadBtn.addEventListener("click", () => {
      draw();

      const link = document.createElement("a");
      link.download = `${titleInput.value || "short-image"}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    [
      titleInput,
      bodyInput,
      footerInput,
      fontSizeSelect,
      marginTypeSelect,
      titleSizeSelect
    ].forEach((element) => {
      element.addEventListener("input", draw);
      element.addEventListener("change", draw);
    });

    document.fonts.ready.then(draw);
    draw();
  </script>
</body>
</html>
